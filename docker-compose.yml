version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: smarthire
      POSTGRES_USER: smarthire
      POSTGRES_PASSWORD: smarthire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  ml-service:
    build:
      context: ./ml-service
    ports:
      - "8001:8001"
    environment:
      SMARTHIRE_ML_MODEL_VERSION: 2026.03

  backend:
    build:
      context: .
    depends_on:
      - postgres
      - redis
      - kafka
      - ml-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smarthire
      SPRING_DATASOURCE_USERNAME: smarthire
      SPRING_DATASOURCE_PASSWORD: smarthire
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SMARTHIRE_ML_BASE_URL: http://ml-service:8001

volumes:
  postgres_data:
