# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/smarthire
spring.datasource.username=postgres
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-256-bit-secret-key-for-jwt-token-generation-and-validation-here-must-be-at-least-32-characters
jwt.expiration=86400000

# Twilio SendGrid Email Configuration
sendgrid.api-key=your_sendgrid_api_key_here
sendgrid.from-email=noreply@smarthire.com
sendgrid.from-name=SmartHire

# AI Service Configuration - Choose one provider
# For Google Gemini (Recommended - has free tier)
ai.service.api-key=YOUR_GEMINI_API_KEY_HERE
ai.service.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
ai.service.provider=gemini

# For OpenAI (alternative)
# ai.service.api-key=YOUR_OPENAI_API_KEY_HERE
# ai.service.url=https://api.openai.com/v1/chat/completions
# ai.service.provider=openai

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.smarthire=DEBUG
logging.level.org.springframework.web.client=DEBUG