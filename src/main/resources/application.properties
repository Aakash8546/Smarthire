# ===============================

# APPLICATION

# ===============================

spring.application.name=smarthire-backend

# ===============================

# DATASOURCE (POSTGRES)

# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/smarthire
spring.datasource.username=smarthire_user
spring.datasource.password=smarthire_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ===============================

# JPA / HIBERNATE

# ===============================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.format_sql=true

# ===============================

# REDIS

# ===============================

spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms

# ===============================

# KAFKA

# ===============================

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=smarthire-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ===============================

# SERVER

# ===============================

server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ===============================

# LOGGING

# ===============================

logging.level.com.smarthire=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================

# ML SERVICE

# ===============================

ml-service.url=http://localhost:8000
ml-service.timeout=30000

# ===============================

# JWT

# ===============================

jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-please-make-it-long-enough}
jwt.expiration=86400000



