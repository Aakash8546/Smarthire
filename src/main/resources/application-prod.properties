# Server Configuration
server.port=${PORT:8081}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Database Configuration (Using environment variables)
spring.datasource.url=jdbc:postgresql://dpg-d724emk50q8c73900ml0-a.oregon-postgres.render.com:5432/smarthire_d1po?sslmode=require
spring.datasource.username=smarthire_d1po_user
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool for Production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration - Production Safe
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ? Hibernate Dialect for PostgreSQL (Important for Production)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging - Production Level
logging.level.com.smarthire=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

# JWT Configuration (Strong secret from environment)
jwt.secret=mySuperSecretKeyForJWTThatIsAtLeast32CharsLong123456
jwt.expiration=86400000

# Email Configuration (From environment)
sendgrid.api-key=${EMAIl_KEY}
sendgrid.from-email=${EMAIL:aakashsrivastava2151@gmail.com}
sendgrid.from-name=${NAME:SmartHire}

# AI Service Configuration (From environment)
ai.service.api-key=${AI_KEY}
ai.service.url=${AI_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent}

# Production Optimizations
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Actuator Endpoints (Optional - for monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
management.metrics.export.prometheus.enabled=false

