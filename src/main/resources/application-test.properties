# Test Database Configuration (Using H2 in-memory database)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration for Tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Disable email for tests
sendgrid.api-key=test-key
sendgrid.from-email=test@test.com
sendgrid.from-name=Test

# Disable AI for tests (use mock)
ai.service.api-key=test-key
ai.service.url=http://localhost:8080
ai.service.provider=mock

# Disable file upload for tests
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging for tests
logging.level.com.smarthire=DEBUG
logging.level.org.springframework.test=DEBUG