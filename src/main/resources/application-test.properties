# Test Database Configuration (Using H2 in-memory database)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration for Tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true


# Email Configuration (Use test or mock for development)
sendgrid.api-key=${EMAIL_KEY}
sendgrid.from-email=${EMAIL}
sendgrid.from-name=SmartHire


# AI Service Configuration (Development)
ai.service.api-key=${AI_KEY}
ai.service.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
ai.service.provider=gemini

# Disable file upload for tests
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging for tests
logging.level.com.smarthire=DEBUG